<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
<title>Color Fall — by Eugine</title>
<meta name="theme-color" content="#050d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="stylesheet" href="clf.css">
</head>
<body>

<!-- HUD -->
<div id="ui"></div>
<div id="leaderboard"></div>
<div id="statusIndicators">
  <div id="shieldIndicator" class="indicator shield hidden">SHIELD READY</div>
  <div id="dangerIndicator" class="indicator danger hidden">DEADLY SKIN</div>
</div>
<div id="gameover"><span id="goTitle">GAME OVER</span><br><span id="goScore"></span><br><span id="goHint">tap to restart</span></div>
<div id="combo"></div>

<!-- Mode select screen -->
<div id="modeScreen">
  <div id="modeBox">
    <div id="modeTitle">COLOR FALL</div>
    <div id="modeSubtitle">by eugine</div>
    <div class="mode-section-label">DIFFICULTY</div>
    <div id="diffBtns">
      <button class="modeBtn diff" data-d="easy">EASY</button>
      <button class="modeBtn diff active" data-d="medium">MEDIUM</button>
      <button class="modeBtn diff" data-d="hard">HARD</button>
    </div>
    <div class="mode-section-label">THEME</div>
    <div id="themeBtns">
      <button class="modeBtn theme active" data-t="cyber">CYBER</button>
      <button class="modeBtn theme" data-t="sunset">SUNSET</button>
      <button class="modeBtn theme" data-t="arctic">ARCTIC</button>
      <button class="modeBtn theme" data-t="void">VOID</button>
    </div>
    <button id="startBtn">LAUNCH</button>
    <div id="bestDisplay"></div>
  </div>
</div>

<!-- Controls bar -->
<div id="weaponBar">
  <button class="weapon active" data-w="basic">BASIC</button>
  <button class="weapon" data-w="spread">SPREAD</button>
  <button class="weapon" data-w="sniper">SNIPER</button>
</div>

<!-- Settings -->
<button id="settingsBtn">⚙</button>
<div id="settingsPanel">
  <div class="sp-title">SETTINGS</div>
  <label>Sound</label>
  <input type="checkbox" id="soundToggle" checked>
  <label>Volume</label>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.15">
  <label>Particle Intensity</label>
  <select id="particleIntensity">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>
  <label>Combo Glow</label>
  <input type="checkbox" id="comboGlow" checked>
  <label>Grid</label>
  <select id="bgModeSelect">
    <option value="dark">Static</option>
    <option value="pulse" selected>Pulse</option>
    <option value="scroll">Scroll</option>
    <option value="off">Off</option>
  </select>
  <label>Skin</label>
  <select id="skinSelect">
    <option value="classic">Classic</option>
    <option value="shield">Shield</option>
    <option value="deadly">Deadly</option>
  </select>
  <button id="restartBtn">RESTART</button>
  <button id="menuBtn">MENU</button>
</div>

<canvas id="c"></canvas>
<script src="clf.js"></script>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js").catch(e => console.log("SW registration failed:", e));
}
</script>
</body>
</html>
